<svg width="900" height="1290" viewBox="0 0 900 1290" xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- Background -->
  <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f7dcff"/>
    <stop offset="25%" stop-color="#e4deff"/>
    <stop offset="50%" stop-color="#f8f8fb"/>
    <stop offset="75%" stop-color="#dfe7ff"/>
    <stop offset="100%" stop-color="#f6ddff"/>
  </linearGradient>

  <!-- Aurora -->
  <radialGradient id="leftGlow" cx="0%" cy="100%" r="70%">
    <stop offset="0%" stop-color="#ff4fd8" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#ff4fd8" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="rightGlow" cx="100%" cy="0%" r="70%">
    <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
  </radialGradient>

  <!-- Timeline -->
  <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#5b8cff"/>
    <stop offset="100%" stop-color="#d946ef"/>
  </linearGradient>

  <!-- Card Shadow -->
  <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="18"
      flood-color="#9d8cff"
      flood-opacity="0.15"/>
  </filter>

  <!-- Node Glow -->
  <filter id="nodeGlow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <style>

    .title {
      fill: #111827;
      font-size: 21px;
      font-weight: 700;
      font-family: Inter, Segoe UI, sans-serif;
    }

    .desc {
      fill: #5b6475;
      font-size: 14px;
      font-family: Inter, Segoe UI, sans-serif;
    }

    .date {
      fill: #3b82f6;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      font-family: Inter, Segoe UI, sans-serif;
    }

    .card {
      fill: rgba(255,255,255,0.26);
      stroke: rgba(255,255,255,0.55);
      stroke-width: 1.2;
    }

    .cardHighlight {
      fill: rgba(255,255,255,0.18);
    }

    .timelineCore {
      stroke: url(#timelineGradient);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .timelineGlow {
      stroke: url(#timelineGradient);
      stroke-width: 10;
      opacity: 0.18;
      stroke-linecap: round;
    }

    .completed {
      fill: #14f195;
    }

    .progress {
      fill: #ffb020;
    }

    .future {
      fill: #b9bfd1;
    }

    .tick {
      stroke: white;
      stroke-width: 2.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nodePulse {
      animation: pulse 2.6s infinite;
      transform-origin: center;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

  </style>

</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="url(#bgGradient)"/>

<!-- Aurora -->
<rect width="100%" height="100%" fill="url(#leftGlow)"/>
<rect width="100%" height="100%" fill="url(#rightGlow)"/>

<!-- Timeline -->
<line x1="140" y1="70" x2="140" y2="1220" class="timelineGlow"/>
<line x1="140" y1="70" x2="140" y2="1220" class="timelineCore"/>

<g filter="url(#cardShadow)">

  <!-- Card -->
  <rect x="190" y="40" width="620" height="86" rx="24" class="card"/>
  <rect x="191" y="41" width="618" height="28" rx="24" class="cardHighlight"/>

  <!-- Node -->
  <circle cx="140" cy="83.0" r="9"
          class="completed nodePulse"
          filter="url(#nodeGlow)"/>

  <path d="M136 83.0
           L140 87.0
           L147 78.0"
        class="tick"/>


  <!-- Text -->
  <text x="225" y="62" class="date">April 2026</text>

  <text x="225" y="92" class="title">
    Cloudflare Proxy Migration
  </text>

  <text x="225" y="118" class="desc">
    Migrate to Cloudflare proxy for improved performance and security
  </text>

</g>

